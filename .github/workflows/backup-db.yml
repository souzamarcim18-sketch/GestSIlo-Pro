name: Backup Automatizado DB (LGPD)

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      - name: Configurar rclone para R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${R2_ACCESS_KEY_ID}
          secret_access_key = ${R2_SECRET_ACCESS_KEY}
          endpoint = ${R2_ENDPOINT}
          region = auto
          no_check_bucket = true
          EOF
          chmod 600 ~/.config/rclone/rclone.conf

      - name: Fazer backup do BD (pg_dump)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          BACKUP_FILE="backup_$TIMESTAMP.sql.gz"
          pg_dump "$SUPABASE_DB_URL" | gzip > "$BACKUP_FILE"
          ls -lh "$BACKUP_FILE"
          echo "BACKUP_FILE=$BACKUP_FILE" >> $GITHUB_ENV

      - name: Upload para Cloudflare R2
        run: |
          rclone copy "${{ env.BACKUP_FILE }}" "r2:${{ secrets.R2_BUCKET }}/backups/"
          echo "✅ Backup enviado para R2"
          rm "${{ env.BACKUP_FILE }}"

      - name: Notificar sucesso
        if: success()
        run: |
          echo "✅ Backup concluído com sucesso em $(date)"
